# Schema for rail_score configuration
rail_score.settings:
  type: config_object
  label: 'RAIL Score settings'
  mapping:
    api_key:
      type: string
      label: 'API Key'
    base_url:
      type: string
      label: 'Base URL'
    auto_evaluate:
      type: boolean
      label: 'Auto evaluate'
    threshold:
      type: float
      label: 'Score threshold'
    auto_unpublish:
      type: boolean
      label: 'Auto unpublish low-scoring content'
    dimensions:
      type: sequence
      label: 'Dimensions'
      sequence:
        type: string
        label: 'Dimension'
    enabled_content_types:
      type: sequence
      label: 'Enabled content types'
      sequence:
        type: string
        label: 'Content type'
