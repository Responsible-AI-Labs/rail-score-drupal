name: Sync from upstream

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://git.drupalcode.org/project/rail_score.git 2>/dev/null || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Determine upstream branch
        id: branch
        run: |
          # Try common branch names in order of preference
          for branch in main master; do
            if git rev-parse --verify "upstream/$branch" >/dev/null 2>&1; then
              echo "name=$branch" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No recognized upstream branch found"
          exit 1

      - name: Merge upstream changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge "upstream/${{ steps.branch.outputs.name }}" --allow-unrelated-histories --no-edit

      - name: Push changes
        run: git push origin HEAD
